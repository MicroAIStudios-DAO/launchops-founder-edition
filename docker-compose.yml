# =============================================================================
#  LaunchOps Founder Edition — Docker Compose Stack
#  Services: WordPress · SuiteCRM · Mautic · Matomo · Vaultwarden
#  Docs: docs/VPS_QUICKSTART.md
# =============================================================================
#
#  NOTE: The `version` field is intentionally omitted — it is obsolete in
#  Docker Compose v2+ and causes a warning if present.
#
#  SuiteCRM image: bertschiweb/suitecrm (community-maintained, based on
#  liteart/docker-suitecrm). Replaces the deprecated bitnami/suitecrm image
#  which was removed from Docker Hub on August 28, 2025 when Bitnami/Broadcom
#  ended free image distribution.
#  Ref: https://github.com/liteart/docker-suitecrm
# =============================================================================

services:
  # 1. WordPress (Site + Course + WooCommerce)
  wordpress:
    image: wordpress:latest
    container_name: launchops_wordpress
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-securepassword123}
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - ./data/wordpress:/var/www/html
    networks:
      - launchops_net
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: launchops_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - launchops_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 2. SuiteCRM (Pipeline / CRM)
  #    Image: bertschiweb/suitecrm — community-maintained SuiteCRM 7.x
  #    Source: https://github.com/liteart/docker-suitecrm
  #    Hub:    https://hub.docker.com/r/bertschiweb/suitecrm
  #
  #    FIRST-RUN SETUP: On first boot, navigate to http://<host>:8081 and
  #    complete the browser-based setup wizard. Use the following values:
  #      DB Host:     db
  #      DB Name:     suitecrm
  #      DB User:     wpuser
  #      DB Password: (value of DB_PASSWORD in .env)
  #
  #    The container runs Apache on internal port 80, exposed as 8081.
  suitecrm:
    image: bertschiweb/suitecrm:latest
    container_name: launchops_suitecrm
    restart: always
    user: "33:33"  # www-data — ensures Apache can write to mounted volumes
    ports:
      - "8081:80"
    volumes:
      - ./data/suitecrm/html:/var/www/html  # full app dir — writable by www-data
    networks:
      - launchops_net
    depends_on:
      db:
        condition: service_healthy

  # 3. Mautic (Email + Marketing Automations)
  #    The v4-apache image entrypoint accepts both MAUTIC_DB_* and MYSQL_*
  #    variable names. Both sets are provided here for compatibility.
  mautic:
    image: mautic/mautic:v4-apache
    container_name: launchops_mautic
    restart: on-failure
    ports:
      - "8082:80"
    environment:
      # Primary variable names used by mautic/mautic:v4-apache entrypoint
      - MAUTIC_DB_HOST=db
      - MAUTIC_DB_PORT=3306
      - MAUTIC_DB_USER=wpuser
      - MAUTIC_DB_PASSWORD=${DB_PASSWORD:-securepassword123}
      - MAUTIC_DB_NAME=mautic
      # Alias variable names (some entrypoint versions use these)
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=mautic
      - MYSQL_USER=wpuser
      - MYSQL_PASSWORD=${DB_PASSWORD:-securepassword123}
      # PHP memory limit for Mautic
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=300
    volumes:
      - ./data/mautic:/var/www/html
    networks:
      - launchops_net
    depends_on:
      db:
        condition: service_healthy

  # 4. Matomo (Privacy-First Analytics)
  matomo:
    image: matomo:latest
    container_name: launchops_matomo
    restart: always
    ports:
      - "8083:80"
    environment:
      - MATOMO_DATABASE_HOST=db
      - MATOMO_DATABASE_USERNAME=wpuser
      - MATOMO_DATABASE_PASSWORD=${DB_PASSWORD:-securepassword123}
      - MATOMO_DATABASE_DBNAME=matomo
    volumes:
      - ./data/matomo:/var/www/html
    networks:
      - launchops_net
    depends_on:
      db:
        condition: service_healthy

  # 5. Vaultwarden (Self-Hosted Bitwarden / Credential Vault)
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: launchops_vaultwarden
    restart: always
    environment:
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=false
      - ADMIN_TOKEN=${VAULT_ADMIN_TOKEN:-generate_a_secure_token}
    ports:
      - "8000:80"
    volumes:
      - ./data/vaultwarden:/data
    networks:
      - launchops_net

  # Note: Stripe (Payments) is handled via API keys in the applications,
  # not a local container. Configure STRIPE_SECRET_KEY in .env.

networks:
  launchops_net:
    driver: bridge
