# LaunchOps Stack — Nginx Reverse Proxy Configuration
# Place behind Caddy or certbot for automatic SSL.

upstream wordpress { server 127.0.0.1:8080; }
upstream suitecrm  { server 127.0.0.1:8081; }
upstream mautic    { server 127.0.0.1:8082; }
upstream matomo    { server 127.0.0.1:8083; }
upstream vault     { server 127.0.0.1:8000; }

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location / {
        proxy_pass http://wordpress;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

